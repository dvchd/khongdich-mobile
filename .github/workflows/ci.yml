name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Generate Drift codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-android:
    name: Build Android (demo + prod)
    needs: analyze-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # required for softprops/action-gh-release
    strategy:
      matrix:
        flavor:
          - name: demo
            app_env: demo
            # Demo build → talks to https://demo.khongdich.com
            # (QA can install this side-by-side with the prod build
            #  thanks to a distinct applicationIdSuffix ".demo".)
          - name: prod
            app_env: prod
            # Production build → talks to https://khongdich.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Generate Drift codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode release keystore
        if: env.KHONGDICH_KEYSTORE_BASE64 != ''
        env:
          KHONGDICH_KEYSTORE_BASE64: ${{ secrets.KHONGDICH_KEYSTORE_BASE64 }}
        run: |
          echo "$KHONGDICH_KEYSTORE_BASE64" | base64 -d > /tmp/khongdich-release.jks
          echo "Keystore decoded: $(ls -la /tmp/khongdich-release.jks)"

      - name: Decode Firebase google-services.json (demo)
        env:
          FIREBASE_CONFIG_DEMO_BASE64: ${{ secrets.FIREBASE_CONFIG_DEMO_BASE64 }}
        run: |
          if [ -n "$FIREBASE_CONFIG_DEMO_BASE64" ]; then
            echo "$FIREBASE_CONFIG_DEMO_BASE64" | base64 -d > android/app/google-services.json
            echo "Firebase demo config decoded"
          else
            cp android/app/google-services.placeholder.json android/app/google-services.json
            echo "No FIREBASE_CONFIG_DEMO_BASE64 secret — using placeholder (push notifications will be disabled)"
          fi

      - name: Decode Firebase google-services.json (prod)
        if: matrix.flavor.name == 'prod'
        env:
          FIREBASE_CONFIG_PROD_BASE64: ${{ secrets.FIREBASE_CONFIG_PROD_BASE64 }}
        run: |
          if [ -n "$FIREBASE_CONFIG_PROD_BASE64" ]; then
            echo "$FIREBASE_CONFIG_PROD_BASE64" | base64 -d > android/app/google-services.json
            echo "Firebase prod config decoded"
          fi

      - name: Build APK
        env:
          APP_ENV: ${{ matrix.flavor.app_env }}
          KHONGDICH_KEYSTORE_BASE64: ${{ secrets.KHONGDICH_KEYSTORE_BASE64 }}
          KHONGDICH_KEYSTORE_PASSWORD: ${{ secrets.KHONGDICH_KEYSTORE_PASSWORD }}
          KHONGDICH_KEY_ALIAS: ${{ secrets.KHONGDICH_KEY_ALIAS }}
          KHONGDICH_KEY_PASSWORD: ${{ secrets.KHONGDICH_KEY_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
        run: |
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=APP_ENV=${APP_ENV} \
            --flavor=${APP_ENV}

      - name: Rename artifacts with build sha + flavor
        run: |
          SHA=${GITHUB_SHA::7}
          FLAVOR=${{ matrix.flavor.name }}
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk \
             artifacts/khongdich-${FLAVOR}-${SHA}.apk
          ls -la artifacts/

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: khongdich-${{ matrix.flavor.name }}-${{ github.sha }}
          path: artifacts/*
          retention-days: 30

      - name: Publish to GitHub Releases (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

      - name: Publish to GitHub Releases (latest-main prerelease)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.apk
          name: Dev build ${{ github.sha }} (${{ matrix.flavor.name }})
          tag_name: dev-${{ matrix.flavor.name }}-${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          body: |
            Automated dev build from `${{ github.sha }}` — **${{ matrix.flavor.name }}** flavor.

            - Backend: ${{ matrix.flavor.app_env == 'demo' && 'https://demo.khongdich.com (test nội bộ)' || 'https://khongdich.com (chính thức)' }}
            - Commit: ${{ github.event.head_commit.message }}
            - Branch: main

            Cài đặt: tải file `.apk` về, mở trên Android (cho phép "Install unknown apps").
            Demo + Prod có thể cài song song vì khác `applicationIdSuffix`.
