org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false

# Suppress the AAR metadata check that fails when Flutter plugin
# subprojects compile against an older compileSdk than AndroidX deps
# require (fragment 1.7+ needs 34+). Our :app compileSdk is 36, so
# the warning is spurious for plugins still pinned at 33.
android.suppressUnsupportedCompileSdk=33,34,35,36
android.experimental.lint.missingBaselineIsEmptyBaseline=true
